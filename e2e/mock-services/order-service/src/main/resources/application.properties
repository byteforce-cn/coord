server.port=${SERVER_PORT:18080}
spring.application.name=order-service

# Coord gRPC 地址
coord.grpc.address=${COORD_GRPC_ADDRESS:localhost:9090}

# Coord 配置 key
coord.config.max-amount-key=order.max-amount
coord.config.retry-times-key=order.retry-times
coord.config.timeout-key=order.timeout

# 默认配置（Coord 中未找到时使用）
order.max-amount=10000
order.retry-times=3
order.timeout=30
