syntax = "proto3";
package coord.agent;

option java_multiple_files = true;
option java_package = "cn.byteforce.coord.sdk.internal.proto";

// ============================================================
// Handshake
// ============================================================

service Handshake {
    rpc Negotiate(HandshakeRequest) returns (HandshakeResponse);
}

message HandshakeRequest {
    string client_version = 1;
}

message HandshakeResponse {
    repeated string supported_versions = 1;
}

// ============================================================
// Registry
// ============================================================

// Service discovery filter mode.
// Default (0) and EXACT (1) both perform exact match for backward compatibility.
// PREFIX (2) matches all services whose name starts with the given service_name.
// ALL (3) returns all registered services regardless of service_name.
enum FilterMode {
    FILTER_MODE_UNSPECIFIED = 0;
    FILTER_MODE_EXACT = 1;
    FILTER_MODE_PREFIX = 2;
    FILTER_MODE_ALL = 3;
}

service Registry {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc Discover(DiscoverRequest) returns (DiscoverResponse);
    rpc Watch(WatchRequest) returns (stream WatchEvent);
}

message RegisterRequest {
    string service_name = 1;
    string instance_id = 2;
    string metadata = 3;
    int32 ttl_seconds = 4;
}

message RegisterResponse {
    int64 lease_id = 1;
}

message DeregisterRequest {
    string service_name = 1;
    string instance_id = 2;
    int64 lease_id = 3;
}

message DeregisterResponse {}

message HeartbeatRequest {
    string service_name = 1;
    string instance_id = 2;
    int64 lease_id = 3;
}

message HeartbeatResponse {
    int64 ttl = 1;
}

message ServiceInstance {
    string instance_id = 1;
    string service_name = 2;
    string metadata = 3;
}

message DiscoverRequest {
    string service_name = 1;
    FilterMode filter_mode = 2;
}

message DiscoverResponse {
    repeated ServiceInstance instances = 1;
    int64 revision = 2;
}

message WatchRequest {
    string service_name = 1;
    int64 start_revision = 2;
}

message WatchEvent {
    enum EventType {
        UNKNOWN = 0;
        INSTANCES_ADDED = 1;
        INSTANCES_REMOVED = 2;
        INSTANCES_UPDATED = 3;
    }
    EventType type = 1;
    repeated ServiceInstance instances = 2;
    int64 revision = 3;
}

// ============================================================
// Config
// ============================================================

service Config {
    rpc Get(ConfigGetRequest) returns (ConfigGetResponse);
    rpc Put(ConfigPutRequest) returns (ConfigPutResponse);
    rpc List(ConfigListRequest) returns (ConfigListResponse);
    rpc Watch(ConfigWatchRequest) returns (stream ConfigWatchEvent);
}

message ConfigGetRequest {
    string key = 1;
}

message ConfigGetResponse {
    string value = 1;  // empty means key not found OR empty value stored
    bool found = 2;    // true if key exists, false otherwise
}

message ConfigPutRequest {
    string key = 1;
    string value = 2;
}

message ConfigPutResponse {
    int64 revision = 1;
}

message ConfigListRequest {
    string prefix = 1;
}

message ConfigListResponse {
    map<string, string> entries = 1;
}

message ConfigWatchRequest {
    string prefix = 1;
    int64 start_revision = 2;
}

message ConfigWatchEvent {
    string key = 1;
    optional string new_value = 2;
    int64 revision = 3;
}

// ============================================================
// Health
// ============================================================

service Health {
    rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
    enum ServingStatus {
        UNKNOWN = 0;
        SERVING = 1;
        NOT_SERVING = 2;
    }
    ServingStatus status = 1;
}
