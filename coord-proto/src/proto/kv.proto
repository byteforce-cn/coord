syntax = "proto3";
package coord.kv;

// 键值对
message KeyValue {
  bytes key = 1;
  bytes value = 2;          // 空 value 表示 tombstone
  int64 create_revision = 3;
  int64 mod_revision = 4;
  int64 version = 5;        // Key 被修改次数
  int64 lease_id = 6;       // 关联的 Lease ID（0 表示无）
}

// 写入请求
message PutRequest {
  bytes key = 1;
  bytes value = 2;
  int64 lease_id = 3;       // 可选 Lease 绑定
  bool prev_kv = 4;         // 是否返回旧值
  bytes request_id = 5;     // 幂等去重 ID
}

message PutResponse {
  KeyValue prev_kv = 1;     // 旧值（若 prev_kv=true）
  int64 revision = 2;       // 写入后的全局 Revision
}

// 范围读取请求
message RangeRequest {
  bytes key = 1;            // 起始 Key
  bytes range_end = 2;      // 结束 Key（左闭右开），空表示单 Key 精确查询
  int64 limit = 3;          // 最大返回条数（0=无限制）
  int64 revision = 4;       // 指定历史 Revision（0=最新）
  bool keys_only = 5;       // 仅返回 Key，不返回 Value
  bool count_only = 6;      // 仅返回计数
}

message RangeResponse {
  repeated KeyValue kvs = 1;
  int64 count = 2;          // 命中总数（count_only 时使用）
  int64 revision = 3;       // 响应 Revision
}

// 删除请求
message DeleteRequest {
  bytes key = 1;
  bytes range_end = 2;
  bool prev_kv = 3;
  bytes request_id = 4;
}

message DeleteResponse {
  int64 deleted = 1;
  repeated KeyValue prev_kvs = 2;
  int64 revision = 3;
}

service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Range(RangeRequest) returns (RangeResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}
