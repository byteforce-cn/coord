# coord 单节点开发环境
#
# 用法（在任意目录执行）：
#   docker compose -f docker/docker-compose.dev.yml up -d
#
# 指定版本：
#   COORD_VERSION=0.1.2 docker compose -f docker/docker-compose.dev.yml up -d
#
# 停止并清理数据：
#   docker compose -f docker/docker-compose.dev.yml down -v

services:
  coord:
    image: registry.cn-hangzhou.aliyuncs.com/byteforce/coord:${COORD_VERSION:-latest}
    container_name: coord-dev
    command: ["dev"]
    ports:
      - "9090:9090"   # gRPC
      - "8080:8080"   # HTTP（metrics / healthz）
    environment:
      COORD_GRPC_ADDR: "0.0.0.0:9090"
      COORD_HTTP_ADDR: "0.0.0.0:8080"
      COORD_DATA_DIR: "/data"
    volumes:
      - coord-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  coord-data:
