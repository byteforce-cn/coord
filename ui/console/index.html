<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!--
      Strict CSP. Inline styles are permitted solely for Vite's runtime HMR
      bootstrap in dev; production build does not emit inline scripts.
      Production hardening (nonce per response) must be applied when this
      HTML is served by coord-server.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coord Console</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
